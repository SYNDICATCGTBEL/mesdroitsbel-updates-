<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adresse e-mail confirmée - MES DROITS BEL</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #152238;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
        border: 1px solid #e3e8f1;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        padding: 34px;
      }

      h1 {
        margin: 0 0 12px;
        color: #d71920;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 16px;
        color: #4b5c74;
        font-size: 17px;
        line-height: 1.55;
      }

      .badge {
        display: inline-flex;
        margin-bottom: 18px;
        border-radius: 999px;
        background: #e8f4ff;
        color: #0f67b1;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">MES DROITS BEL</div>
      <h1>Adresse e-mail confirmée</h1>
      <p>
        Votre adresse e-mail est maintenant confirmée. Vous pouvez fermer cette page et revenir
        dans l'application MES DROITS BEL pour vous connecter.
      </p>
      <p>
        L'accès complet reste soumis à la validation de votre compte par l'administrateur CGT BEL.
      </p>
    </main>
  </body>
</html>
