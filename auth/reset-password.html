<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Réinitialiser le mot de passe - MES DROITS BEL</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #152238;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
        box-sizing: border-box;
        border: 1px solid #e3e8f1;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
        padding: 34px;
      }

      h1 {
        margin: 0 0 12px;
        color: #d71920;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 16px;
        color: #4b5c74;
        font-size: 17px;
        line-height: 1.55;
      }

      .badge {
        display: inline-flex;
        margin-bottom: 18px;
        border-radius: 999px;
        background: #e8f4ff;
        color: #0f67b1;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .hidden { display: none; }

      input {
        width: 100%;
        box-sizing: border-box;
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid #e3e8f1;
        background: #f8fafc;
        padding: 0 14px;
        font-size: 15px;
        margin-bottom: 12px;
        outline: none;
      }

      input:focus { border-color: #d71920; }

      button {
        width: 100%;
        min-height: 50px;
        border: none;
        border-radius: 25px;
        background: #d71920;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 4px;
      }

      button:disabled { opacity: 0.55; cursor: default; }
      .error { color: #d71920; font-size: 14px; margin-top: 8px; }
      .success { color: #1a7a3a; font-size: 14px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">MES DROITS BEL</div>

      <div id="loading-view">
        <h1>Vérification du lien</h1>
        <p>Veuillez patienter quelques secondes.</p>
      </div>

      <div id="reset-view" class="hidden">
        <h1>Réinitialiser le mot de passe</h1>
        <p>Choisissez un nouveau mot de passe pour votre compte.</p>
        <input id="pwd1" type="password" placeholder="Nouveau mot de passe (8 caractères min.)" autocomplete="new-password" />
        <input id="pwd2" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password" />
        <button id="submit-btn" type="button">Enregistrer le mot de passe</button>
        <div id="msg" class="error" role="status"></div>
      </div>

      <div id="error-view" class="hidden">
        <h1>Lien invalide ou expiré</h1>
        <p id="error-message">
          Demandez un nouveau lien depuis la page « Mot de passe oublié » de l'application.
        </p>
      </div>
    </main>

    <script>
      var SUPABASE_URL = 'https://fqpjifhxmlyoiejzjoxo.supabase.co';
      var SUPABASE_KEY = 'sb_publishable_EWQfulLHZCZBSJBKXVwXUw_WPwxRFNx';
      var resetToken = '';

      function showView(id) {
        ['loading-view', 'reset-view', 'error-view'].forEach(function (viewId) {
          document.getElementById(viewId).className = viewId === id ? '' : 'hidden';
        });
      }

      function showError(message) {
        document.getElementById('error-message').textContent = message ||
          'Demandez un nouveau lien depuis la page « Mot de passe oublié » de l\'application.';
        showView('error-view');
      }

      function activateReset(accessToken) {
        resetToken = accessToken;
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
        showView('reset-view');
      }

      function initializeReset() {
        var query = new URLSearchParams(window.location.search);
        var hash = new URLSearchParams(window.location.hash.substring(1));
        var error = hash.get('error_description') || query.get('error_description') ||
          hash.get('error') || query.get('error') || '';
        var accessToken = hash.get('access_token') || query.get('access_token') || '';
        var tokenHash = query.get('token_hash') || '';
        var type = hash.get('type') || query.get('type') || 'recovery';

        if (error) {
          showError('Ce lien est invalide ou a expiré. Demandez un nouveau lien depuis l\'application.');
          return;
        }

        if (accessToken) {
          activateReset(accessToken);
          return;
        }

        if (tokenHash && type === 'recovery') {
          fetch(SUPABASE_URL + '/auth/v1/verify', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY
            },
            body: JSON.stringify({ token_hash: tokenHash, type: 'recovery' })
          }).then(function (response) {
            if (!response.ok) throw new Error('verification_failed');
            return response.json();
          }).then(function (session) {
            if (!session.access_token) throw new Error('missing_token');
            activateReset(session.access_token);
          }).catch(function () {
            showError('Ce lien est invalide ou a expiré. Demandez un nouveau lien depuis l\'application.');
          });
          return;
        }

        showError('Ce lien ne contient pas les informations nécessaires. Demandez un nouveau lien depuis l\'application.');
      }

      function submitReset() {
        var p1 = document.getElementById('pwd1').value;
        var p2 = document.getElementById('pwd2').value;
        var msg = document.getElementById('msg');
        var btn = document.getElementById('submit-btn');

        msg.className = 'error';
        if (p1.length < 8) {
          msg.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
          return;
        }
        if (p1 !== p2) {
          msg.textContent = 'Les deux mots de passe ne correspondent pas.';
          return;
        }
        if (!resetToken) {
          msg.textContent = 'Lien de réinitialisation invalide. Demandez un nouveau lien.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Enregistrement...';
        msg.textContent = '';

        fetch(SUPABASE_URL + '/auth/v1/user', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + resetToken
          },
          body: JSON.stringify({ password: p1 })
        }).then(function (response) {
          if (!response.ok) throw new Error('update_failed');
          resetToken = '';
          msg.className = 'success';
          msg.textContent = 'Mot de passe enregistré. Vous pouvez fermer cette page et vous connecter dans l\'application.';
          btn.textContent = 'Terminé';
        }).catch(function () {
          btn.disabled = false;
          btn.textContent = 'Enregistrer le mot de passe';
          msg.textContent = 'Erreur lors de l\'enregistrement. Le lien a peut-être expiré. Demandez un nouveau lien.';
        });
      }

      document.getElementById('submit-btn').addEventListener('click', submitReset);
      initializeReset();
    </script>
  </body>
</html>
